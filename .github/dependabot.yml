version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      node-tooling:
        patterns:
          - "@types/node"
          - "tsx"
          - "typescript"
    ignore:
      - dependency-name: "openclaw"
      - dependency-name: "@openclaw/plugin-inspector"
